# This is an example Docker Compose stack for running the MongoDB and Redis instances required by the OpenVersus servers.
# Note that the "ovs" network shared by the services in this stack is the same network used by the OpenVersus servers containers.
# In the other containers, the "ovs" network is configured as an external network, meaning that it is not created by those stacks, but rather,
# those stacks expect that Docker network to already exist and attempt to attach to it. The "ovs" Docker network is created by this DB stack.
# You could also choose to create this network ahead of time, but the reasoning behind this stack creating the network is that
# if the DBs aren't running, nothing else will either. This allows the services to communicate with each other using the aliases defined in
# the configuration below, even if they're running in separate stacks.
#
# Adjust the configuration as needed to fit your specific setup and requirements, especially the volume mappings and environment variable files.

services:
  openversus-mongo:
    deploy:
      resources:
        limits:
          cpus: "2"
    env_file: .env.mongo
    image: mongo
    networks:
      ovs:
        aliases:
          - openversus_mongo
          - openversus-mongo
          - mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

    # The host portion of the port mapping below is absent for a reason.
    #
    # You don't need to (and should not) expose this to the Internet
    # under normal (nearly all) circumstances. The only valid case where
    # this would not be true is if you're running Mongo or Redis on a
    # separate host from the OpenVersus server, or on a separate Docker
    # network, but if you're doing that, you are not the target audience
    # of this comment and probably already know how to adjust the
    # configuration accordingly.
    ports:
      - "27017"

  openversus-redis:
    command: redis-server /usr/local/etc/redis/redis.conf
    deploy:
      resources:
        limits:
          cpus: "2"
    image: redis:8-alpine
    networks:
      ovs:
        aliases:
          - openversus_redis
          - openversus-redis
          - redis

    # See the novel of a comment I wrote for the Mongo service above regarding the port mapping.
    # TL;DR: don't expose this to the Internet, and if you need to run it on a separate host or
    # Docker network, adjust the configuration accordingly. Adjust the source path to the redis.conf
    # file as needed. An example configuration is available in the repo in the "examples" directory.
    ports:
      - "6379"
    restart: unless-stopped
    volumes:
      - /opt/docker/openversus/dbs/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:

networks:
  ovs:
    name: ovs
